<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>DCF/RIM Method Selection</title>
  <link rel="stylesheet" href="dcf.css" />
</head>

<body>
  <header>Select Analysis Method</header>

  <main class="method-selection-container">
    <button
      type="button"
      id="dcfButton"
      class="method-card dcf-card"
    >
      DCF
    </button>

    <button
      type="button"
      id="rimButton"
      class="method-card rim-card"
    >
      RIM
    </button>

    <button
      type="button"
      id="archiveButton"
      class="method-card archive-card"
    >
      ARCHIVE
    </button>
  </main>

  <button
    type="button"
    id="backButton"
    class="back-button"
  >
    ← BACK
  </button>

  <script src="dcf.js"></script>
</body>
</html>
