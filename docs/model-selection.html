<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Select Analysis Model</title>
  
  <link rel="stylesheet" href="model-selection.css" />
</head>

<body>
  <header>Select Analysis Model</header>
  <main class="model-selection-container">
    <button
      type="button"
      id="optButton"
      class="model-card optimistic-card"
    >
      OPTIMISTIC
    </button>

    <button
      type="button"
      id="balButton"
      class="model-card balanced-card"
    >
      BALANCED
    </button>

    <button
      type="button"
      id="conButton"
      class="model-card conservative-card"
    >
      CONSERVATIVE
    </button>
  </main>

  <button
    type="button"
    id="backButton"
    class="back-button"
  >
    ← BACK
  </button>

  <script src="model-selection.js"></script>
</body>
</html>
