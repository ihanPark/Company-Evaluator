<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Graph Extremes Finder</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            margin: 2rem;
            background: #f6f7fb;
            color: #222;
        }
        h1 {
            text-align: center;
        }
        .card {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 2rem;
        }
        label {
            display: block;
            font-weight: 600;
            margin-top: 1rem;
        }
        input {
            width: 100%;
            padding: 0.5rem;
            margin-top: 0.25rem;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 1rem;
        }
        button {
            margin-top: 1.5rem;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            border: none;
            background: #4f46e5;
            color: #fff;
            border-radius: 6px;
            cursor: pointer;
        }
        button:hover {
            background: #4338ca;
        }
        .results {
            margin-top: 2rem;
            display: grid;
            gap: 1rem;
        }
        .result-card {
            background: #eef2ff;
            padding: 1rem;
            border-radius: 8px;
        }
        .error {
            color: #b91c1c;
            margin-top: 1rem;
        }
        .hint {
            font-size: 0.9rem;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Graph Maximum and Minimum Finder</h1>
        <p class="hint">
            Enter a mathematical expression using the variable <code>x</code> (e.g. <code>Math.sin(x)</code> or <code>x*x - 4*x + 1</code>)
            and choose the range and step size over which to evaluate the function.
        </p>
        <label for="expression">Function expression</label>
        <input id="expression" type="text" placeholder="x*x - 4*x + 1" value="x*x - 4*x + 1" />

        <label for="start">Start of range</label>
        <input id="start" type="number" value="-10" />

        <label for="end">End of range</label>
        <input id="end" type="number" value="10" />

        <label for="step">Step size</label>
        <input id="step" type="number" value="0.1" step="0.1" />

        <button id="analyze">Find extremes</button>
        <div id="message" class="error" role="alert"></div>
        <div id="results" class="results" aria-live="polite"></div>
    </div>

    <script>
        const expressionInput = document.getElementById('expression');
        const startInput = document.getElementById('start');
        const endInput = document.getElementById('end');
        const stepInput = document.getElementById('step');
        const resultsContainer = document.getElementById('results');
        const messageContainer = document.getElementById('message');

        function parseNumber(input, name) {
            const value = Number(input.value);
            if (!Number.isFinite(value)) {
                throw new Error(`The ${name} must be a valid number.`);
            }
            return value;
        }

        function evaluateExpression(expression, x) {
            // Build a function with the expression bound to the identifier x.
            // eslint-disable-next-line no-new-func
            const fn = new Function('x', `return ${expression};`);
            const result = fn(x);
            if (!Number.isFinite(result)) {
                throw new Error(`The expression produced a non-finite value at x = ${x}.`);
            }
            return result;
        }

        function findExtremes(expression, start, end, step) {
            if (end <= start) {
                throw new Error('The end of the range must be greater than the start.');
            }
            if (step <= 0) {
                throw new Error('The step size must be greater than 0.');
            }

            let maxPoint = { x: start, y: evaluateExpression(expression, start) };
            let minPoint = { ...maxPoint };

            for (let x = start; x <= end; x = Number((x + step).toFixed(12))) {
                const y = evaluateExpression(expression, x);
                if (y > maxPoint.y) {
                    maxPoint = { x, y };
                }
                if (y < minPoint.y) {
                    minPoint = { x, y };
                }
            }

            return { maxPoint, minPoint };
        }

        document.getElementById('analyze').addEventListener('click', () => {
            messageContainer.textContent = '';
            resultsContainer.innerHTML = '';

            let expression;
            let start;
            let end;
            let step;

            try {
                expression = expressionInput.value.trim();
                if (!expression) {
                    throw new Error('Please provide an expression to evaluate.');
                }
                start = parseNumber(startInput, 'start value');
                end = parseNumber(endInput, 'end value');
                step = parseNumber(stepInput, 'step size');

                const { maxPoint, minPoint } = findExtremes(expression, start, end, step);

                resultsContainer.innerHTML = `
                    <div class="result-card">
                        <strong>Maximum Point</strong>
                        <p>x = ${maxPoint.x.toFixed(4)}, y = ${maxPoint.y.toFixed(4)}</p>
                    </div>
                    <div class="result-card">
                        <strong>Minimum Point</strong>
                        <p>x = ${minPoint.x.toFixed(4)}, y = ${minPoint.y.toFixed(4)}</p>
                    </div>
                `;
            } catch (error) {
                console.error(error);
                messageContainer.textContent = error.message;
            }
        });
    </script>
</body>
</html>
